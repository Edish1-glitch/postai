name: PostAI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          files=("index.html" "sw.js" "manifest.json" "vercel.json" "api/generate.js" "package.json")
          fail=0
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then echo "✅ $f"
            else echo "❌ חסר: $f"; fail=1; fi
          done
          [ $fail -eq 0 ] || exit 1

      - name: Validate JSON files
        run: |
          for f in manifest.json vercel.json package.json; do
            python3 -c "import json; json.load(open('$f'))" \
              && echo "✅ $f תקין" \
              || { echo "❌ $f לא תקין"; exit 1; }
          done

      - name: Check manifest RTL + Hebrew
        run: |
          python3 - <<'EOF'
          import json
          m = json.load(open('manifest.json'))
          assert m.get('lang') == 'he', "lang חייב להיות he"
          assert m.get('dir') == 'rtl', "dir חייב להיות rtl"
          assert len(m.get('icons', [])) >= 2, "חייבים לפחות 2 אייקונים"
          print("✅ manifest — RTL, עברית, אייקונים")
          EOF

      - name: Check API handler
        run: |
          python3 - <<'EOF'
          code = open('api/generate.js').read()
          checks = {'llama-3.3-70b-versatile': 'מודל', 'GROQ_API_KEY': 'env var', 'export default': 'ES module', 'max_tokens': 'token limit'}
          fail = any(print(f"❌ {l}") or True for k, l in checks.items() if k not in code)
          [print(f"✅ {l}") for k, l in checks.items() if k in code]
          if fail: raise SystemExit(1)
          EOF

      - name: Check index.html essentials
        run: |
          python3 - <<'EOF'
          html = open('index.html').read()
          checks = {'dir="rtl"': 'RTL', '/api/generate': 'endpoint', 'sw.js': 'SW', 'postai_history_v2': 'localStorage', 'GEN_COOLDOWN_MS': 'debounce', 'SUGGESTION_POOL': 'suggestion pool', '2026': 'תוכן עדכני'}
          fail = False
          for k, l in checks.items():
            if k in html: print(f"✅ {l}")
            else: print(f"❌ חסר: {l}"); fail = True
          if fail: raise SystemExit(1)
          EOF

  matrix-test:
    name: Matrix Test (Mock)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run matrix — all tone × format combos (mock, no quota)
        run: python3 tests/matrix.py --url https://postai-nine.vercel.app
