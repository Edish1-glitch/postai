name: PostAI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from GitHub UI
    inputs:
      run_live:
        description: 'Run live API tests (uses quota)'
        required: false
        default: 'false'

env:
  PROD_URL: https://postai-nine.vercel.app

jobs:

  # ── Job 1: Static validation (no API, instant) ───────────────────
  validate:
    name: Static Validation
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Run validate.py
        run: python3 tests/validate.py

  # ── Job 2: Mock matrix — all angle × format combos (no quota) ────
  mock-matrix:
    name: Mock Matrix (no quota)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Vercel deployment
        run: sleep 45
      - name: Run matrix (mock mode)
        run: python3 tests/matrix.py --url ${{ env.PROD_URL }}

  # ── Job 3: Live quality tests (manual trigger only, uses quota) ───
  live-quality:
    name: Live Quality Tests
    runs-on: ubuntu-latest
    needs: mock-matrix
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_live == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Run live.py (9 real API calls)
        run: python3 tests/live.py --url ${{ env.PROD_URL }}
