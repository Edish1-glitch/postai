name: PostAI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: ✅ Validate Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validation tests
        run: python3 tests/validate.py

      - name: Check API syntax (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint api/generate.js
        run: node --input-type=module < api/generate.js 2>&1 || true

  live-test:
    name: 🌐 Live API Test
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for Vercel deploy
        run: sleep 30

      - name: Test live API
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST https://postai-nine.vercel.app/api/generate \
            -H "Content-Type: application/json" \
            -d '{"topic":"test","platform":"twitter","tone":"professional","length":"short"}')

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ API עובד תקין"
          else
            echo "❌ API החזיר status $RESPONSE"
            exit 1
          fi
